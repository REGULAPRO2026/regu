<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REGULAPRO WORLD</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>

#lyricsOverlay{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999999;
}

.lyricLine{
    position:fixed;
    left:50%;
    bottom:28px;
    transform:translateX(-50%);
    width:auto;
    max-width:90vw;
    padding:8px 16px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(8px);
    border-radius:8px;
    color:#fff;
    font-size:24px;
    font-weight:600;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    opacity:0;
    transition:opacity .25s ease;
    z-index:99999999;
    pointer-events:none;
}

@keyframes lyricFloat{
  0%{opacity:0; transform:translate(-50%, 80px);}
  10%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0; transform:translate(-50%, -300px);}
}

#regu{
    cursor:grab;
    user-select:none;
    touch-action:none;
    transition:transform .15s;
    position:fixed;
    width:clamp(70px,7vw,90px);
    height:clamp(70px,7vw,90px);
    right:140px;
    bottom:240px;
    z-index:99999;
}

#regu:active{
    cursor:grabbing;
    transform:scale(1.05);
}

#regu img{
 width:100%;
 height:100%;
 border-radius:50%;
 object-fit:cover;
}

#reguFace{
 width:100%;
 height:100%;
 object-fit:contain;
 pointer-events:none;
 filter:drop-shadow(0 0 15px rgba(0,255,136,.5));
}

@keyframes respirar{
 0%{transform:scale(1);}
 50%{transform:scale(1.08);}
 100%{transform:scale(1);}
}

#regu{
 animation: respirar 3s ease-in-out infinite;
}

#reguBubble{
    position:fixed;
    left:50%;
    bottom:25px;
    transform:translateX(-50%);
    width:auto;
    max-width:85vw;
    padding:8px 18px;
    color:#fff;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-radius:10px;
    font-family:Segoe UI,Arial;
    font-size:22px;
    font-weight:600;
    line-height:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    z-index:999999;
    transition:opacity .25s ease;
}

#camBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#111;
  color:white;
  cursor:pointer;
  z-index:99999999;
}

#camaraHeader{
  cursor:move;
  touch-action:none;
}

#camaraIA{
  position:fixed;
  right:20px;
  bottom:20px;
  width:420px;
  height:420px;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  z-index:999999;
  box-shadow:0 0 20px rgba(0,0,0,.5);
  resize:both;
  overflow:hidden;
  min-width:250px;
  min-height:200px;
}

#youtubePanel{
  position:fixed;
  top:100px;
  left:100px;
  width:420px;
  height:420px;
  background:#111;
  color:white;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,.6);
  z-index:999999;
  overflow:hidden;
  display:none;
  resize:both;
}

#youtubeHeader{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  background:#ff0000;
  color:white;
  font-weight:bold;
  cursor:grab;
}

#camaraHeader{
  height:35px;
  background:#222;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  font-size:12px;
  cursor:move;
  touch-action:none;
}

#camaraStream{
  width:100%;
  height:calc(100% - 35px);
  object-fit:cover;
}

:root{
  --bg:#111;
  --panel:rgba(25,25,25,.92);
  --texto:#fff;
  --texto2:#ccc;
  --naranja:#ff7a00;
  --naranja2:#ff3d00;
  --borde:rgba(255,255,255,.15);
  --radio:16px;
  --sombra:0 10px 30px rgba(0,0,0,.35);
}

button{
  border:none;
  border-radius:var(--radio);
  background:linear-gradient(145deg,var(--naranja),var(--naranja2));
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s ease;
}

button:active{
  transform:scale(.97);
}

.msgBubble{
  background:linear-gradient(145deg,rgba(30,30,30,.95),rgba(60,60,60,.75));
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  color:white;
  font-size:22px;
  box-shadow:0 8px 25px rgba(0,0,0,.35);
  transition:all .25s ease;
}

.msgNombre{
  color:#00ff95;
  font-weight:800;
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.msgTexto{
  color:white;
  font-size:20px;
  line-height:1.5;
}

#chatBox{
  position:fixed;
  left:20px;
  bottom:20px;
  z-index:999999;
}

.chatBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:#111;
  color:#00ff88;
  padding:14px 18px;
  border-radius:40px;
  font-size:20px;
  width:auto;
  max-width:180px;
  white-space:nowrap;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.8); opacity:0.4;}
  100%{transform:scale(1); opacity:1;}
}

#chatBox.open .chatBtn{
  background:#00c853;
  color:white;
}

.warning-banner,.warning-bar,.warning-banner-bar,#warning{
  display:none !important;
}

html,body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:var(--bg);
  color:var(--texto);
}

#muroInput{
  flex:1;
  padding:12px 14px;
  font-size:18px;
  border-radius:10px;

  background:rgba(255,255,255,0.08);

}

#muroMensajes::-webkit-scrollbar{width:8px;}
#muroMensajes::-webkit-scrollbar-track{background:transparent;}
#muroMensajes::-webkit-scrollbar-thumb{background:rgba(150,150,150,0.5); border-radius:10px;}
#muroMensajes::-webkit-scrollbar-thumb:hover{background:rgba(180,180,180,0.7);}

#btnEstoyAqui{
  position:fixed;
  bottom:200px;
  right:40px;
  z-index:9999;
  background:#00c853;
  color:white;
  padding:5px 5px;
  border-radius:5px;
  font-size:36px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px rgba(0,0,0,.4);
}

#map{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  margin:0;
  padding:0;
  z-index:1;
}

#inputTop{
  position:fixed;
  top:60px;
  height:36px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  padding:22px;
  border-radius:50px;
  font-size:34px;
  text-align:center;
  z-index:5000;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(15,15,15,.75);
  backdrop-filter:blur(14px);
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 1px 1px rgba(255,255,255,.08);
}

.circleBtn{
  position:fixed;
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:56px;
  cursor:pointer;
  z-index:6000;
  background:rgba(20,20,20,.85);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 1px 1px rgba(255,255,255,.08);
  transition:all .25s ease;
}

.circleBtn:active{transform:scale(0.92);}

#btnLeft.activo{
  background:linear-gradient(145deg,#00c853,#00ff95);
  box-shadow:0 0 25px #00ff95, 0 0 60px rgba(0,255,149,0.6);
  transform:scale(1.1);
}

#btnLeft{top:100px; left:20px;}
#btnRight{top:100px; right:20px;}

#header{
  position:fixed;
  top:180px;
  bottom:150px;
  left:-100%;
  width:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  transition:left 0.4s ease;
  z-index:20000;
  padding:20px;
  box-sizing:border-box;
  backdrop-filter:blur(12px);
  background:rgba(17,17,17,0.85);
  color:#fff;
  box-shadow:var(--sombra);
}

#header.open{left:0;}

#lateral{
  position:fixed;
  top:160px;
  right:-100%;
  width:520px;
  height:calc(100% - 180px);
  padding:18px;
  overflow:auto;
  box-sizing:border-box;
  background:rgba(18,18,18,.72);
  backdrop-filter:blur(20px);
  border-left:1px solid rgba(0,255,136,.25);
  border-radius:22px 0 0 22px;
  box-shadow:-12px 0 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.04);
  transition:right .35s ease;
  z-index:20000;
  color:white;
  resize:horizontal;
  overflow:auto;
  min-width:320px;
  max-width:95vw;
}

#lateral::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  cursor:ew-resize;
  background:linear-gradient(to bottom,transparent,rgba(0,255,136,.4),transparent);
}

#lateral{user-select:none;}

#lateral.open{right:0;}

#lateral::-webkit-scrollbar{width:14px;}
#lateral::-webkit-scrollbar-track{background:transparent;}
#lateral::-webkit-scrollbar-thumb{background:#00ff88; border-radius:20px;}
#lateral::-webkit-scrollbar-thumb:hover{background:#4dffb2;}

#barra input,#barra button{
  width:100%;
  margin:14px 0;
  padding:28px;
  font-size:36px;
  border-radius:12px;
  border:none;
}

#box{overflow-y:auto; max-height:50%;}

#menuCirculos{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  background:rgba(10,10,10,.55);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  padding:6px 10px;
  border-radius:40px;
  z-index:99999;
}

  #menuCirculos{bottom:6px; padding:5px 8px; gap:8px;}
}

#btnSalirTour{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:20px 40px;
  font-size:28px;
  background:#000;
  color:#fff;
  border-radius:20px;
  z-index:9999;
  display:none;
}

.miniBtn{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#1b1b1b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:36px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 4px 15px rgba(0,0,0,.4), inset 0 1px 1px rgba(255,255,255,.1);

}

.miniBtn:active{transform:scale(0.95);}
.miniBtn:hover{transform:translateY(-3px);}

.miniBtn.activo{
  background:linear-gradient(145deg,#00c853,#00ff95);
  box-shadow:0 0 25px #00ff95;
}

.vivoBtn{position:relative;}

.vivoBtn::after{
  content:"";
  position:absolute;
  width:14px;
  height:14px;
  top:8px;
  right:8px;
  background:#00ff88;
  border-radius:50%;
  box-shadow:0 0 12px #00ff88;
  animation:pulse 1.2s infinite;
}

@media (max-width:768px){
  .miniBtn{width:64px !important; height:64px !important; font-size:30px !important;}
}

.card{
  background:white;
  margin:12px;
  padding:18px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  font-size:32px;
  cursor:pointer;
}

.card img{width:100%; height:260px; object-fit:cover;}

.overlay{
  position:absolute;
  width:420px;
  height:650px;
  background:white;
  border-radius:14px;
  box-shadow:0 20px 15px rgba(0,0,0,0.5);
  transform:translate(-50%,-80%);
  z-index:9999;
  display:flex;
  flex-direction:column;
}

.overlay,.overlay *{color:#111;}

.overlay .perfil{width:100%; height:350px; object-fit:cover;}
.overlay .info{padding:10px; font-size:24px;}

.productos{
  flex:1;
  overflow-y:scroll;
  background:#f2f2f2;
  min-height:120px;
}

.productos::-webkit-scrollbar{width:28px;}
.productos::-webkit-scrollbar-track{background:#ddd; border-radius:22px;}
.productos::-webkit-scrollbar-thumb{background:#00c853; border-radius:20px;}
.productos::-webkit-scrollbar-thumb:hover{background:#00ff95;}

.producto{
  display:flex;
  gap:20px;
  padding:20px;
  border-bottom:1px solid #ccc;
}

.producto img{width:250px; height:250px; border-radius:8px; object-fit:cover;}

.precio{
  background:black;
  color:white;
  padding:3px 8px;
  border-radius:6px;
  font-size:16px;
}

.cardVertical{
  background:white;
  margin:12px 0;
  padding:18px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  font-size:24px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  transition:.25s;
  border:1px solid rgba(255,255,255,.05);
}

.cardVertical:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 35px rgba(0,255,136,.18);
}

.brillo{animation:flashBorder 1.2s ease-in-out;}

@keyframes flashBorder{
  0%{box-shadow:0 0 0px #ff3d00;}
  50%{box-shadow:0 0 25px 8px #ff3d00;}
  100%{box-shadow:0 0 0px #ff3d00;}
}

.cardVertical img.perfilCard{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  object-position:center;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.infoCard{padding:12px 0;}

.productosCard{display:flex; flex-wrap:wrap; gap:12px; margin-top:12px;}

.productoCard{
  width:calc(33% - 8px);

}

.productoCard img{width:100%; height:160px; object-fit:cover; border-radius:8px;}

.detalleProducto{
  background:#ffffff;
  color:#111;
  padding:10px;

}

.precioProducto{color:#00c853; font-weight:900; font-size:16px;}
.descProducto{font-size:14px; color:#222;}

input[type=file]{
  width:100%;
  padding:20px;
  background:#fff;
  border-radius:14px;
  font-size:28px;
  margin:14px 0;
}

    position:fixed;
    left:20px;

@keyframes fadeInMsg{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

.glow-green{

}

.glow-orange{
  box-shadow:0 0 10px #ff7a00, 0 0 25px rgba(255,122,0,.5), inset 0 0 10px rgba(255,122,0,.2);
}

.glow-red{
  box-shadow:0 0 10px #ff3d00, 0 0 25px rgba(255,61,0,.5), inset 0 0 10px rgba(255,61,0,.2);
}

#aiBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#111;
  color:white;
  font-size:24px;
  z-index:9999;

}

.aiPanel{
  position:fixed;
  bottom:150px;
  right:20px;
  width:420px;
  height:420px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);

.aiHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:9999999;
  touch-action:none;
}

.aiChat{
  flex:1;

  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{padding:8px 10px; border-radius:10px; max-width:80%; font-size:14px;}

.aiInputBox button:active{transform:scale(0.95);}

.aiMsgUser{
  align-self:flex-end;

  border-radius:14px 14px 4px 14px;
  max-width:80%;
}

.aiMsgBot{
  align-self:flex-start;
  background:rgba(255,255,255,0.08);
  color:#fff;
  padding:10px 12px;
  border-radius:14px 14px 14px 4px;
  max-width:80%;
}

  0%{box-shadow:0 0 0 0 rgba(0,255,149,0.4);}
  70%{box-shadow:0 0 0 15px rgba(0,255,149,0);}
  100%{box-shadow:0 0 0 0 rgba(0,255,149,0);}
}

.aiMsgUser,.aiMsgBot{animation:msgIn 0.2s ease-out;}

@keyframes msgIn{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

input,textarea,select{font-size:16px;}

@supports (-webkit-touch-callout:none){
  input,textarea{font-size:16px !important;}
}

input:focus,textarea:focus{transform:translateZ(0);}

.btnCerrarPro{
  background:linear-gradient(145deg,#00c853,#00ff95);
  color:black;
  border:none;
  padding:8px 14px;
  border-radius:12px;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(0,255,136,0.25);
  transition:0.2s ease;
}

.btnCerrarPro:active{transform:scale(0.95);}

#perfilPanel{
  position:fixed;
  top:20px;
  right:20px;
  width:420px;
  max-width:90vw;
  height:80vh;
  background:#111;
  color:white;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,.5);

#perfilCerrar{
  height:50px;

}

#perfilContenido{
  height:calc(100% - 50px);

// =======================================================
// FUNCIONES DE LIMPIEZA
// =======================================================
function clean(v){ return (v||"").toString().trim(); }

function cleanRut(v){
  return (v||"").toString().replace(/\./g,"").replace(/-/g,"").trim();
}

function cleanPhone(v){
  let num = (v||"").toString().replace(/\D/g,"");
  if(num.length === 8) return "569"+num;
  if(num.length === 9 && num.startsWith("9")) return "56"+num;
  if(num.startsWith("56")) return num;
  return num;
}

function normalizar(texto){
  return (texto||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function fraseAleatoria(lista){
  return lista[Math.floor(Math.random()*lista.length)];
}

// =======================================================
// CONVERTIR URL DRIVE
// =======================================================
function convertirDrive(url){
  if(!url) return "";
  if(!url.includes("drive.google.com")) return url;
  const match = url.match(/[-\w]{25,}/);
  if(match) return "https://drive.google.com/thumbnail?id=" + match[0] + "&sz=w1000";
  return url;
}

// =======================================================
// OVERLAY PERSONALIZADO
// =======================================================
class CustomOverlay extends google.maps.OverlayView{
  constructor(position, data){
    super();
    this.fijado = false;
    this.position = position;
    this.data = data;
    this.div = null;
  }

  highlight(color="#ffcc00"){
    if(this.div){
      this.div.style.boxShadow = "0 6px 15px " + color + ", 0 0 40px rgba(255,204,0,0.5)";
      this.div.style.zIndex = 10000;
    }
  }

  normalize(){
    if(this.div){
      this.div.style.boxShadow = "0 6px 15px rgba(0,0,0,0.45)";
      this.div.style.zIndex = 9999;
    }
  }

  onAdd(){
    this.div = document.createElement("div");
    this.div.className = "overlay";
    this.div.style.display = "none";

    this.div.addEventListener("mouseenter", () => {
      overlays.forEach(o => { if(o.div) o.div.style.zIndex = 9999; });
      this.div.style.zIndex = 99999;
    });

    this.div.addEventListener("mouseleave", () => {
      this.div.style.zIndex = 9999;
      this.normalize();
    });

    this.div.addEventListener("click", (e) => {
      e.stopPropagation();
      if(isDraggingMap) return;
      if(bloqueoClickOverlay) return;

      const lateral = document.getElementById("lateral");
      if(filtroActivo) renderLateral(dataGlobal);
      if(!lateral.classList.contains("open")) lateral.classList.add("open");

      const tarjeta = lateral.querySelector(".perfilCard[data-fila='" + this.data.fila + "']");
      if(tarjeta){
        tarjeta.scrollIntoView({behavior:"smooth", block:"center"});
        lateral.querySelectorAll(".cardVertical").forEach(c => {
          c.style.boxShadow = "";
          c.classList.remove("brillo");
        });
        const cardParent = tarjeta.parentElement;
        cardParent.style.boxShadow = "0 0 20px #ff3d00";
        cardParent.classList.add("brillo");
        setTimeout(() => cardParent.classList.remove("brillo"), 1200);
      }
    });

    let productos = [
      {img:clean(this.data.foto1), precio:clean(this.data.precio1), desc:clean(this.data.descripcion1)},
      {img:clean(this.data.foto2), precio:clean(this.data.precio2), desc:clean(this.data.descripcion2)},
      {img:clean(this.data.foto3), precio:clean(this.data.precio3), desc:clean(this.data.descripcion3)}
    ].filter(p => p.img !== "");

    if(productos.length === 0){
      productos = [{img:"https://placehold.co/80", precio:"", desc:"Sin productos"}];
    }

    const foto = convertirDrive(clean(this.data.link));
    const srcFinal = foto || "https://placehold.co/600x400?text=Sin+Foto";

    this.div.innerHTML = `
      <img class="perfil" src="${srcFinal}" onerror="this.src='https://placehold.co/600x400?text=Sin+Foto'">
      <div class="info">
        <div style="display:flex;gap:8px;margin-top:10px;">
          <input id="msg_${this.data.fila}" placeholder="Escribe un mensaje..."
            onclick="event.stopPropagation()" onfocus="event.stopPropagation()"
            onmousedown="event.stopPropagation()" onpointerdown="event.stopPropagation()"
            ontouchstart="event.stopPropagation()"
            style="flex:1;padding:18px;border-radius:12px;border:1px solid #ccc;font-size:28px;">
          <button onclick="event.stopPropagation(); enviarMensajeRapido(${this.data.fila})"
            style="background:#00c853;color:white;border:none;padding:18px 24px;font-size:24px;border-radius:8px;font-weight:bold;cursor:pointer;">
            Enviar
          </button>
        </div>
        <b>${clean(this.data.nombre)}</b><br>
        <div style="background:#ff3d00;color:#fff;padding:5px 10px;border-radius:8px;display:inline-block;margin:5px 0;">
          NECESITO: ${clean(this.data.necesito) || "No especifica"}
        </div>
        OFREZCO: ${clean(this.data.ofrezco)}<br>
      </div>
      <div class="productos">
        ${productos.map(p => `
          <div class="producto">
            <img src="${p.img}" onerror="this.src='https://placehold.co/250?text=Sin+Foto'">
            <div>
              <div class="precio">$${p.precio}</div>
              <div>${p.desc}</div>
            </div>
          </div>
        `).join("")}
      </div>
    `;

    this.getPanes().overlayMouseTarget.appendChild(this.div);
  }

  draw(){
    if(!this.div) return;
    const projection = this.getProjection();
    if(!projection) return;
    const pos = projection.fromLatLngToDivPixel(this.position);
    if(!pos) return;
    this.div.style.left = pos.x + "px";
    this.div.style.top = pos.y + "px";
    const zoom = map.getZoom();
    let scale = (zoom < 13 ? 0.9 : 1) * getMobileScale();
    this.div.style.transform = "translate(-50%,-65%) scale(" + scale + ")";
  }

  onRemove(){
    if(this.div) this.div.remove();
  }
}

function getMobileScale(){
  const w = window.innerWidth;
  if(w < 480) return 1.6;
  if(w < 768) return 1.3;
  return 1;
}

function render(data){
  const lateral = document.getElementById("lateral");
  lateral.innerHTML = "";
  markers.forEach(m => m.setMap(null));
  marcadoresAqui.forEach(m => m.setMap(null));
  marcadoresAqui = [];
  markers = [];
  dataGlobal = data;

  overlays.forEach(o => {
    if(o.div) o.div.remove();
    o.setMap(null);
  });
  overlays = [];

  const infowindow = new google.maps.InfoWindow();

  data.forEach(d => {
    const pos = new google.maps.LatLng(d.lat, d.lng);
    const marker = new google.maps.Marker({position:pos, map:map});

    if(Number(d.fila) === Number(filaActual)){
      marker.setIcon({
        path: google.maps.SymbolPath.CIRCLE,
        scale: 14,
        fillColor: "#00ff95",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 4
      });
      marker.setZIndex(9999);
    }

    marker.addListener("mouseover", () => {
      const overlay = overlays.find(o => Number(o.data.fila) === Number(d.fila));
      if(overlay && overlay.div){
        overlay.div.style.display = "flex";
        overlay.div.style.zIndex = 99999;
      }
    });

    marker.addListener("mouseout", () => {
      const overlay = overlays.find(o => Number(o.data.fila) === Number(d.fila));
      if(overlay && overlay.div && !overlay.fijado && !overlaysActivos){
        overlay.div.style.display = "none";
      }
    });

    marker.addListener("click", () => {
      const html = `
        <div style="max-width:250px;">
          <h3>${d.nombre || ""}</h3>
          <img src="${d.foto1 || ''}" style="width:100%; border-radius:8px;" onerror="this.style.display='none'">
          <p>${d.direccion || ""}</p>
          <a href__="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank">Ver en Google Maps</a>
        </div>
      `;
      infowindow.setContent(html);
      infowindow.open(map, marker);
    });

    marker.data = d;
    markers.push(marker);

    if(d.ultimaLat && d.ultimaLng){
      const pinAqui = new google.maps.Marker({
        position:{lat:d.ultimaLat, lng:d.ultimaLng},
        map:map,
        icon:{
          path:google.maps.SymbolPath.CIRCLE,
          scale:12,
          fillColor:"#00ff00",
          fillOpacity:1,
          strokeColor:"#ffffff",
          strokeWeight:3
        },
        title:"Aquí"
      });
      marcadoresAqui.push(pinAqui);
    }

    const overlay = new CustomOverlay(pos, d);
    overlay.setMap(map);
    overlays.push(overlay);
  });

  renderLateral(data);
  resaltarOfrecimientos();
}

function resaltarPorNecesito(necesitoValor){
  overlays.forEach(overlay => {
    const ofrezco = (overlay.data.ofrezco || "").toLowerCase();
    if(ofrezco.includes(necesitoValor.toLowerCase())){
      overlay.highlight("#00ff95");
    } else {
      overlay.normalize();
    }
  });
}

function resaltarPines(termino){
  markers.forEach(m => {
    const nombre = (m.data.nombre || "").toLowerCase();
    const ofrezco = (m.data.ofrezco || "").toLowerCase();
    const necesito = (m.data.necesito || "").toLowerCase();
    const match = nombre.includes(termino) || ofrezco.includes(termino) || necesito.includes(termino);
    if(match){
      m.setIcon({
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: "#00ff95",
        fillOpacity: 1,
        strokeColor: "#00ff95",
        strokeWeight: 2
      });
      m.setZIndex(999);
    } else {
      m.setIcon(null);
      m.setZIndex(1);
    }
  });
}

function resaltarOfrecimientos(valor){
  const termino = (valor || necesitoActual || "").toLowerCase();
  if(!termino){
    markers.forEach(m => {
      m.setIcon(null);
      m.setZIndex(1);
      lineasLaser.forEach(l => l.setMap(null));
      lineasLaser = [];
    });
    return;
  }
  const lateral = document.getElementById("lateral");
  const cards = Array.from(lateral.querySelectorAll(".cardVertical"));
  const coincidencias = [];

  cards.forEach(card => {
    const text = (
      (card.querySelector(".ofrezco")?.textContent || "") +
      (card.querySelector(".necesito")?.textContent || "") +
      (card.querySelector("b")?.textContent || "")
    ).toLowerCase();
    if(text.includes(termino)){
      card.style.border = "4px solid #00ff95";
      coincidencias.push(card);
    } else {
      card.style.border = "";
    }
  });

  coincidencias.forEach(c => lateral.insertBefore(c, lateral.firstChild));

  if(coincidencias.length){
    const fila = parseInt(coincidencias[0].querySelector(".perfilCard")?.dataset.fila);
    const overlay = overlays.find(o => o.data.fila === fila);
    if(overlay){
      map.panTo(overlay.position);
      map.setZoom(16);
      if(activeOverlay && activeOverlay.div) activeOverlay.normalize();
      activeOverlay = overlay;
      activeOverlay.highlight("#ff3d00");
    }
  }
}

function toggleOverlays(){
  overlaysVisibles = !overlaysVisibles;
  overlays.forEach(o => {
    if(!o.div) return;
    o.div.style.display = overlaysVisibles ? "flex" : "none";
  });
}

function resetFiltro(){
  inputTop.value = "";
  filtroActivo = "";
  necesito.value = "";
  necesitoActual = "";
  render(dataGlobal);
  overlays.forEach(o => o.normalize());
  overlays.forEach(o => {
    if(!o.div) return;
    if(overlaysVisibles){
      o.div.style.display = "flex";
      o.div.style.opacity = "1";
    } else {
      o.div.style.display = "none";
      o.div.style.opacity = "0";
    }
  });
  const lateral = document.getElementById("lateral");
  lateral.querySelectorAll(".cardVertical").forEach(c => {
    c.style.border = "";
    c.style.opacity = 1;
  });
  markers.forEach(m => { m.setIcon(null); m.setZIndex(1); });
  lineasLaser.forEach(l => l.setMap(null));
  lineasLaser = [];
}

// =======================================================
function guardar(){
  if(guardando) return;
  guardando = true;

  const btn = document.getElementById("btnGuardar");
  btn.innerText = "Guardando...";
  btn.disabled = true;

  const direccionTexto = direccion.value.trim();

  if(!direccionTexto){
    alert("⚠️ Debes ingresar una dirección");
    guardando = false;
    btn.innerText = "Guardar";
    btn.disabled = false;
    return;
  }

  if(!rut.value || !nombre.value || !whatsapp.value || !clave.value){
    alert("⚠️ Debes completar RUT, Nombre, WhatsApp y Clave");
    guardando = false;
    btn.innerText = "Guardar";
    btn.disabled = false;
    return;
  }

  btn.innerText = "📍 Ubicando dirección...";

  geocodificarDireccion(direccionTexto).then(coords => {
    const data = {
      fila: filaActual,
      rut: rut.value.trim(),
      clave: clave.value.trim(),
      nombre: nombre.value.trim(),
      direccion: direccionTexto,
      ofrezco: ofrezco.value.trim(),
      necesito: necesito.value.trim(),
      link: document.getElementById("link_url").value || "",
      whatsapp: whatsapp.value.trim(),
      lat: coords.lat,
      lng: coords.lng,
      foto1: document.getElementById("foto1_url")?.value || "",
      precio1: precio1.value.trim(),
      descripcion1: descripcion1.value.trim(),
      foto2: document.getElementById("foto2_url")?.value || "",
      precio2: precio2.value.trim(),
      descripcion2: descripcion2.value.trim(),
      foto3: document.getElementById("foto3_url")?.value || "",
      precio3: precio3.value.trim(),
      descripcion3: descripcion3.value.trim()
    };

    google.script.run.withSuccessHandler(() => {
      btn.innerText = "✅ Ya estás visible";
      btnLeft.classList.add("activo");
      btnLeft.innerText = "✔";

      if(!filaActual){
        google.script.run.withSuccessHandler(data => {
          const r = cleanRut(rut.value);
          const w = cleanPhone(whatsapp.value);
          const encontrado = data.find(d =>
            cleanRut(d.rut) === r &&
            cleanPhone(d.whatsapp).endsWith(w)
          );
          if(encontrado){
            filaActual = encontrado.fila;
          }
        }).obtenerDatos();
      }

      setTimeout(() => {
        btn.innerText = "Guardar";
        btn.disabled = false;
        guardando = false;
      }, 2000);

      google.script.run.withSuccessHandler(data => {
        render(data);
        const overlayUsuario = overlays.find(o => o.data.fila === filaActual);
        if(overlayUsuario){
          map.panTo(overlayUsuario.position);
          map.setZoom(17);
        }
      }).obtenerDatos();
    }).guardarDatos(data);
  }).catch(() => {
    alert("❌ Dirección no válida");
    btn.innerText = "💾 Guardar y aparecer en el mapa";
    btn.disabled = false;
    guardando = false;
  });
}

function geocodificarDireccion(direccion){
  return new Promise((resolve, reject) => {
    const geo = new google.maps.Geocoder();
    geo.geocode({address:direccion}, (results, status) => {
      if(status === "OK" && results[0]){
        const location = results[0].geometry.location;
        resolve({lat:location.lat(), lng:location.lng()});
      } else {
        reject("No se pudo geocodificar");
      }
    });
  });
}

// TOUR
// =======================================================
function distancia(a, b){
  const dx = a.lat() - b.lat();
  const dy = a.lng() - b.lng();
  return Math.sqrt(dx*dx + dy*dy);
}

function iniciarTour(){
  if(!overlays.length){ alert("No hay datos para recorrer"); return; }
  tourActivo = true;
  tourIndex = 0;
  const centro = map.getCenter();
  let candidatos = overlays.filter(o => o.div && o.div.style.display !== "none");
  candidatos.sort((a, b) => distancia(a.position, centro) - distancia(b.position, centro));
  tourRuta = candidatos.slice(0, 10);

  document.getElementById("inputTop").style.display = "none";
  document.getElementById("menuCirculos").style.display = "none";
  document.getElementById("btnLeft").style.display = "none";
  document.getElementById("btnRight").style.display = "none";
  document.getElementById("btnSalirTour").style.display = "block";

  ejecutarTour();
}

function ejecutarTour(){
  if(!tourActivo || tourIndex >= tourRuta.length){
    detenerTour();
    return;
  }
  const overlay = tourRuta[tourIndex];
  const destino = overlay.position;

  overlays.forEach(o => { if(o.div) o.div.style.display = "none"; });
  if(overlay.div) overlay.div.style.display = "flex";

  flyTo(destino, () => {
    overlay.highlight("#ff3d00");
    setTimeout(() => {
      overlay.normalize();
      tourIndex++;
      ejecutarTour();
    }, 3500);
  });
}

function flyTo(destino, callback){
  const start = map.getCenter();
  const duration = 2000;
  const startTime = performance.now();
  function animar(tiempo){
    const t = Math.min((tiempo - startTime) / duration, 1);
    const lat = start.lat() + (destino.lat() - start.lat()) * t;
    const lng = start.lng() + (destino.lng() - start.lng()) * t;
    map.setCenter({lat, lng});
    map.setZoom(13 + t * 1.5);
    if(t < 1){ requestAnimationFrame(animar); }
    else { if(callback) callback(); }
  }
  requestAnimationFrame(animar);
}

function detenerTour(){
  tourActivo = false;
  overlays.forEach(o => {
    if(o.div){
      o.div.style.display = overlaysVisibles ? "flex" : "none";
      o.normalize();
    }
  });
  markers.forEach(m => m.setAnimation(null));
  document.getElementById("inputTop").style.display = "block";
  document.getElementById("menuCirculos").style.display = "flex";
  document.getElementById("btnLeft").style.display = "flex";
  document.getElementById("btnRight").style.display = "flex";
  document.getElementById("btnSalirTour").style.display = "none";
}

// REGU - VOZ Y ANIMACIÓN
// =======================================================
function reguHabla(texto, priority = 1){
  if(!texto) return;
  if(!window.reguVoice){
    window.reguVoice = {queue:[], speaking:false, current:null, mode:"normal"};
  }
  if(window.reguVoice.mode === "silent") return;
  window.reguVoice.queue.push({text:texto, priority:priority});
  window.reguVoice.queue.sort((a,b) => b.priority - a.priority);
  if(!window.reguVoice.speaking){
    procesarColaRegu();
  }
}

function procesarColaRegu(){
  if(window.reguVoice.queue.length === 0){
    window.reguVoice.speaking = false;
    animarRegulito(false);
    ocultarLyric();
    return;
  }
  window.reguVoice.speaking = true;
  const task = window.reguVoice.queue.shift();
  const partes = task.text.split(/[.!?]+/).filter(t => t.trim());
  let i = 0;

  const hablar = () => {
    if(i >= partes.length){
      setTimeout(procesarColaRegu, 300);
      return;
    }
    const frase = partes[i].trim();
    mensajeMapa(frase);
    const voz = new SpeechSynthesisUtterance(frase);
    voz.lang = "es-CL";
    voz.onstart = () => animarRegulito(true);
    voz.onend = () => {
      setTimeout(() => { i++; hablar(); }, 400);
    };
    speechSynthesis.speak(voz);
  };
  hablar();
}

function reguModo(modo){
  window.reguVoice.mode = modo;
}

function animarRegulito(hablando){
  const regu = document.getElementById("reguFace");
  if(!regu) return;
  clearInterval(reguAnimacion);
  if(hablando){
    reguAnimacion = setInterval(() => {
      const escala = 1 + Math.random()*0.025;
      const y = Math.random()*2 - 1;
      regu.style.transform = "translateY(" + y + "px) scale(" + escala + ")";
    }, 90);
  } else {
    regu.style.transform = "translateY(0px) scale(1)";
  }
}

function moverReguA(el){
  if(!el) return;
  const regu = document.getElementById("regu");
  const r = el.getBoundingClientRect();
  let x = r.left + (r.width / 2) - 45;
  let y = r.top + (r.height / 2) - 45;
  if(x < 10) x = 10;
  if(y < 70) y = 70;
  if(x > window.innerWidth - 120) x = window.innerWidth - 120;
  if(y > window.innerHeight - 120) y = window.innerHeight - 120;
  regu.style.right = "auto";
  regu.style.bottom = "auto";
  regu.style.left = x + "px";
  regu.style.top = y + "px";

  const bubble = document.getElementById("reguBubble");
  if(bubble){
    bubble.style.left = (x + 110) + "px";
    bubble.style.top = (y + 10) + "px";
    bubble.style.transform = "translateY(-50%)";
  }

  const satelite = document.getElementById("reguSatelite");
  if(satelite){
    satelite.style.left = (x + 140) + "px";
    satelite.style.top = (y + 15) + "px";
  }
}

function explorarCategoria(tipo){

      ...EXPLORADOR.playas,

      ...EXPLORADOR.naturaleza
    ];
    destino = todas[Math.floor(Math.random() * todas.length)];
  } else {
    const lista = EXPLORADOR[tipo];
    destino = lista[Math.floor(Math.random() * lista.length)];

    "Estoy buscando el mejor lugar para aterrizar.",
    "Ya casi está listo el viaje.",
    "Estoy preparando la ruta.",
    "Ya casi nos vamos.",
    "Me encanta esta parte del viaje."
  ];

  reguHabla(fraseAleatoria(frasesSalida));
  iniciarCuentaRegresiva();
  buscarDireccionMapa();

    const sorpresa = Math.random() < 0.25;
    let extra = "";

document.addEventListener("change", function(e){
  if(e.target.id !== "fileAudio") return;
  const files = e.target.files;
  playlist = Array.from(files).map(f => ({name:f.name, url:URL.createObjectURL(f)}));
  currentIndex = 0;
  renderPlaylist();
  playSongFromFile(0);
});

function playSongFromFile(index){
  if(!playlist.length) return;
  currentIndex = index;
  const audio = document.getElementById("audioPlayer");
  const song = playlist[index];
  audio.pause();
  audio.src = song.url;
  audio.load();
  audio.play().then(() => updatePlaylistUI()).catch(err => console.error(err));
}

function nextSong(){
  if(!playlist.length) return;
  currentIndex++;
  if(currentIndex >= playlist.length) currentIndex = 0;
  playSongFromFile(currentIndex);
}

function renderPlaylist(){
  const list = document.getElementById("playlist");
  list.innerHTML = "";
  playlist.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "songItem";
    div.innerText = song.name;
    div.onclick = () => playSongFromFile(i);
    list.appendChild(div);
  });
  updatePlaylistUI();
}

function updatePlaylistUI(){
  const items = document.querySelectorAll(".songItem");
  items.forEach((el, i) => {
    el.classList.remove("songActive");
    if(i === currentIndex) el.classList.add("songActive");
  });
}

function startEQ(){
  const bars = new Array(25).fill(10);
  const canvas = document.getElementById("eq");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = canvas.clientWidth;
  canvas.height = 60;
  setInterval(() => {
    const panel = document.getElementById("winampPanel");
    if(!panel || panel.style.display === "none") return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let i = 0; i < bars.length; i++){
      bars[i] += (Math.random() - 0.5) * 12;
      bars[i] = Math.max(5, Math.min(60, bars[i]));
      ctx.fillStyle = "#00ff88";
      const x = i * 12;
      const y = canvas.height - bars[i];
      ctx.fillRect(x, y, 8, bars[i]);
    }
  }, 120);
}

function mostrarLugarGoogle(placeId){
  if(window.reguLugarLock) return;
  window.reguLugarLock = true;

  const panel = document.getElementById("panelLugar");
  const service = new google.maps.places.PlacesService(map);

  service.getDetails({
    placeId: placeId,
    fields:["name","formatted_address","geometry","rating","photos"]
  }, (place, status) => {
    try{
      if(status !== google.maps.places.PlacesServiceStatus.OK || !place){
        reguHabla("No pude encontrar este lugar.");
        window.reguLugarLock = false;
        return;
      }

      if(place.geometry?.location){
        map.panTo(place.geometry.location);
        map.setZoom(17);
      }

      reguHabla(place.name + ". " + (place.formatted_address || ""));

      let portada = "";
      if(place.photos && place.photos.length){
        portada = '<img src="' + place.photos[0].getUrl({maxWidth:1600}) + '" style="width:calc(100% + 36px); margin:-18px -18px 18px -18px; height:260px; object-fit:cover; border-radius:20px 20px 0 0;">';
      }

      let galeria = "";
      if(place.photos && place.photos.length){
        galeria = place.photos.slice(1, 8).map(f =>
          '<img src="' + f.getUrl({maxWidth:900}) + '" style="width:100%; height:210px; object-fit:cover; border-radius:14px; margin-top:10px;">'
        ).join("");
      }

      panel.innerHTML = `
        ${portada}
        <div style="padding:0 4px;">
          <h1 style="margin:0; font-size:30px; font-weight:800; line-height:1.1;">${place.name}</h1>
          <div style="margin-top:10px; font-size:20px; color:#FFD54F;">⭐ ${place.rating || "-"}</div>
          <div style="margin-top:12px; font-size:18px; opacity:.85; line-height:1.5;">📍 ${place.formatted_address || ""}</div>
          ${galeria}
        </div>
      `;

      panel.classList.add("show");
      reguComentarioLugar(place);
    } catch(err){
      console.log(err);
      reguHabla("Error cargando el lugar.");
    }
    window.reguLugarLock = false;
  });
}

function cerrarPanelLugar(){

function reguComentarioLugar(place){
  const nombre = place.name || "este lugar";
  const rating = place.rating || 0;
  let mensaje = "";
  if(rating >= 4.6) mensaje = "Wow. " + nombre + " es uno de los lugares mejor valorados aquí.";
  else if(rating >= 4.0) mensaje = nombre + " tiene buenas referencias. Es una opción segura.";
  else if(rating >= 3.0) mensaje = nombre + " está promedio. Puede ser interesante.";
  else mensaje = nombre + " no tiene muchas buenas reseñas. Revísalo con calma.";
  reguHabla(mensaje, 2);
}

function hacerArrastrable(id, headerId){
  const box = document.getElementById(id);
  const header = headerId ? document.getElementById(headerId) : box;
  if(!box) return;

  const pos = localStorage.getItem(id + "_pos");
  if(pos){
    const p = JSON.parse(pos);
    box.style.left = p.left;
    box.style.top = p.top;
    box.style.right = "auto";
    box.style.bottom = "auto";
  }

  let moviendo = false;
  let offsetX = 0;
  let offsetY = 0;

  header.addEventListener("mousedown", (e) => {
    moviendo = true;
    offsetX = e.clientX - box.offsetLeft;
    offsetY = e.clientY - box.offsetTop;
    box.style.right = "auto";
    box.style.bottom = "auto";
  });
  document.addEventListener("mousemove", (e) => {
    if(!moviendo) return;
    box.style.left = (e.clientX - offsetX) + "px";
    box.style.top = (e.clientY - offsetY) + "px";
  });
  document.addEventListener("mouseup", () => { moviendo = false; });

  header.addEventListener("touchstart", (e) => {
    moviendo = true;
    const t = e.touches[0];
    offsetX = t.clientX - box.offsetLeft;
    offsetY = t.clientY - box.offsetTop;
    box.style.right = "auto";
    box.style.bottom = "auto";
  }, {passive:false});
  document.addEventListener("touchmove", (e) => {
    if(!moviendo) return;
    const t = e.touches[0];
    box.style.left = (t.clientX - offsetX) + "px";
    box.style.top = (t.clientY - offsetY) + "px";
    e.preventDefault();
  }, {passive:false});
  document.addEventListener("touchend", () => { moviendo = false; });
}

// 🎤 MICRÓFONO - RECONOCIMIENTO DE VOZ
// =======================================================
function iniciarVozInteligente(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Tu navegador no soporta reconocimiento de voz. Prueba con Chrome.");
    return;
  }

  // Si ya está escuchando, detener
  if(vozActiva && reconocimientoVoz){
    vozActiva = false;
    reconocimientoVoz.stop();
    reguHabla("Modo voz desactivado.");
    return;
  }

  reconocimientoVoz = new SpeechRecognition();
  reconocimientoVoz.lang = "es-ES";
  reconocimientoVoz.continuous = false;
  reconocimientoVoz.interimResults = true;

  const output = document.getElementById("textoRegulito");

  reguHabla("Te escucho...");

  reconocimientoVoz.onresult = (event) => {
    let texto = "";
    for(let i = event.resultIndex; i < event.results.length; i++){
      texto += event.results[i][0].transcript;
    }
    output.value = texto;

    // Solo procesar cuando la frase es final
    if(event.results[event.results.length - 1].isFinal){
      procesarComandoRegu(texto.trim());
    }
  };

  reconocimientoVoz.onerror = (e) => {
    console.error("ERROR VOZ:", e.error);
    vozActiva = false;
    if(e.error === "not-allowed"){
      alert("Debes permitir el acceso al micrófono en tu navegador.");
    }
  };

  reconocimientoVoz.onend = () => {
    vozActiva = false;
  };

  reconocimientoVoz.start();
  vozActiva = true;
}

function procesarComandoRegu(texto){
  texto = (texto || "").toLowerCase().trim();
  if(!texto) return;

  // Comandos locales rápidos
  if(texto.includes("explorar")){ toggleExplorador(); return; }
  if(texto.includes("playa")){ explorarCategoria("playas"); return; }
  if(texto.includes("romántic")){ explorarCategoria("romántico"); return; }
  if(texto.includes("castillo")){ explorarCategoria("castillos"); return; }
  if(texto.includes("naturaleza")){ explorarCategoria("naturaleza"); return; }
  if(texto.includes("cámara")){ toggleCamaraIA(); return; }
  if(texto.includes("música")){ playMusicaAmbiente(); return; }
  if(texto.includes("detente") || texto.includes("para la música") || texto.includes("silencio")){ stopMusica(); return; }

  // Pregunta a la IA vía servidor
  const wa = window.usuarioActual?.whatsapp || "";

  reguHabla("Déjame pensar...");

  google.script.run
    .withSuccessHandler(resp => {
      if(resp) reguHabla(resp);
    })
    .withFailureHandler(err => {
      console.error("ERROR IA:", err);
      reguHabla("Se me enredaron los cables.");
    })
    .preguntarIA(texto, wa);
}

// =======================================================
// ONLOAD
// =======================================================
window.onload = () => {
  let visitas = parseInt(localStorage.getItem("visitasRegu") || "0");
  visitas++;
  localStorage.setItem("visitasRegu", visitas);

  setTimeout(actualizarMuro, 5000);
  setInterval(actualizarMuro, 15000);
  setInterval(actualizarOnline, 30000);

  setTimeout(() => {
    const btn = document.querySelectorAll(".miniBtn")[4];
    if(btn) btn.innerHTML = "📍";
  }, 500);

  const fileInput = document.getElementById("fileHidden");
  fileInput.addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 5 * 1024 * 1024){
      alert("⚠️ Imagen muy pesada");
      return;
    }
    const reader = new FileReader();
    reader.onload = function(evt){
      const img = new Image();
      img.onload = function(){
        const canvas = document.createElement("canvas");
        const maxWidth = 1200;
        const scale = Math.min(maxWidth / img.width, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.8);
        google.script.run.withSuccessHandler(url => {
          if(!url){ alert("❌ Error subiendo imagen"); return; }
          const finalUrl = convertirDrive(url);
          const campoVisible = document.getElementById(window.campoActivo);
          if(campoVisible) campoVisible.value = finalUrl;
          const hidden = document.getElementById(window.campoActivo + "_url");
          if(hidden) hidden.value = finalUrl;
        }).subirImagen(base64);
      };
      img.src = evt.target.result;
    };
    reader.readAsDataURL(file);
  });

  setTimeout(() => {
    hacerArrastrable("camaraIA", "camaraHeader");
    hacerArrastrable("aiPanel", "aiHeader");
  }, 1000);

  hacerArrastrable("regu");
};

// Error global
window.onerror = function(msg, url, line, col, error){
  console.log("🔥 ERROR GLOBAL:", msg, "en línea", line);
};

// Touch overlays
document.addEventListener("touchstart", () => {
  overlays.forEach(o => {
    if(o.div) o.div.style.pointerEvents = "auto";
  });
});

// Focus tracking
document.addEventListener("focusin", (e) => {
  if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA"){
    inputActivo = true;
  }
});
document.addEventListener("focusout", () => {
  setTimeout(() => { inputActivo = false; }, 150);
});

// Mouse move gira regu
document.addEventListener("mousemove", function(e){
  const regu = document.getElementById("regu");
  if(!regu) return;
  const centro = window.innerWidth / 2;
  const giro = (e.clientX - centro) / 40;
  regu.style.rotate = giro + "deg";
});

// Resize canvas eq
window.addEventListener("resize", () => {
  const canvas = document.getElementById("eq");
  if(canvas) canvas.width = canvas.clientWidth;
});

</script>
