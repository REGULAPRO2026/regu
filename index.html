<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REGULAPRO WORLD</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
/* ============================================================
   REGULAPRO WORLD — SISTEMA VISUAL UNIFICADO v1.0
   Design tokens aplicados a todos los paneles, ventanas,
   cuadros de diálogo y elementos flotantes del ecosistema.
   ============================================================ */
:root{
  /* Base */
  --rp-bg:#0a0a0c;
  --rp-panel-bg:rgba(14,14,18,0.85);
  --rp-panel-bg-solid:#0e0e12;
  --rp-panel-header:rgba(0,0,0,0.30);
  --rp-border:rgba(255,255,255,0.08);
  --rp-border-accent:rgba(0,255,136,0.18);

  /* Text */
  --rp-text:#ffffff;
  --rp-text-2:rgba(255,255,255,0.65);
  --rp-text-3:rgba(255,255,255,0.40);

  /* Accents */
  --rp-green:#00ff88;
  --rp-green-d:#00c853;
  --rp-orange:#ff7a00;
  --rp-red:#ff3d00;
  --rp-blue:#00bfff;
  --rp-yellow:#FFD54F;
  --rp-purple:#b000ff;

  /* Radii */
  --rp-r-sm:8px;
  --rp-r-md:14px;
  --rp-r-lg:20px;
  --rp-r-xl:28px;
  --rp-r-pill:9999px;

  /* Shadows */
  --rp-shadow:0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  --rp-shadow-sm:0 8px 24px rgba(0,0,0,0.4);
  --rp-glow:0 0 25px rgba(0,255,136,0.20);

  /* Typography */
  --rp-font:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
  --rp-font-mono:'Consolas','SF Mono',Menlo,monospace;

  /* Transitions */
  --rp-t:0.25s ease;
  --rp-t-smooth:0.35s cubic-bezier(0.2,0.8,0.2,1);
}

/* ============================================================
   CLASES COMPARTIDAS — aplicables a cualquier panel del sistema
   ============================================================ */
.rp-panel{
  background:var(--rp-panel-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--rp-border);
  border-radius:var(--rp-r-lg);
  box-shadow:var(--rp-shadow);
  color:var(--rp-text);
  font-family:var(--rp-font);
  overflow:hidden;
}

.rp-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:var(--rp-panel-header);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--rp-border);
  font-weight:700;
  font-size:16px;
  color:var(--rp-green);
  cursor:move;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}

.rp-panel-body{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.rp-btn{
  border:1px solid var(--rp-border);
  border-radius:var(--rp-r-md);
  background:rgba(255,255,255,0.06);
  color:var(--rp-text);
  padding:10px 16px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:var(--rp-t);
  font-family:var(--rp-font);
  text-align:center;
}

.rp-btn:hover{
  background:rgba(0,255,136,0.12);
  border-color:var(--rp-border-accent);
  color:var(--rp-green);
}

.rp-btn:active{transform:scale(0.96);}

.rp-btn-accent{
  background:linear-gradient(145deg,var(--rp-green-d),var(--rp-green));
  color:#001a0e;
  border:none;
}

.rp-btn-accent:hover{
  background:linear-gradient(145deg,var(--rp-green),var(--rp-green));
  color:#001a0e;
}

.rp-btn-danger{
  background:linear-gradient(145deg,#cc3300,var(--rp-red));
  color:#fff;
  border:none;
}

.rp-btn-close{
  background:rgba(255,61,0,0.18);
  color:var(--rp-red);
  border:none;
  border-radius:var(--rp-r-sm);
  padding:4px 10px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:var(--rp-t);
  line-height:1;
}

.rp-btn-close:hover{
  background:var(--rp-red);
  color:#fff;
}

.rp-input{
  width:100%;
  padding:10px 14px;
  border-radius:var(--rp-r-md);
  border:1px solid var(--rp-border);
  background:rgba(255,255,255,0.05);
  color:var(--rp-text);
  font-size:15px;
  font-family:var(--rp-font);
  outline:none;
  transition:var(--rp-t);
  box-sizing:border-box;
}

.rp-input::placeholder{color:var(--rp-text-3);}

.rp-input:focus{
  border-color:var(--rp-border-accent);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 0 2px rgba(0,255,136,0.08);
}

.rp-label{
  font-size:12px;
  font-weight:600;
  color:var(--rp-text-2);
  text-transform:uppercase;
  letter-spacing:0.5px;
}

/* ============================================================
   BASE
   ============================================================ */
*{box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:var(--rp-bg);
  color:var(--rp-text);
  font-family:var(--rp-font);
}

.warning-banner,.warning-bar,.warning-banner-bar,#warning{
  display:none !important;
}

/* ============================================================
   MAPA
   ============================================================ */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  margin:0;
  padding:0;
  z-index:1;
}

/* ============================================================
   HUD SUPERIOR
   ============================================================ */
#hudTop{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:linear-gradient(90deg,#050505,#0e0e12,#050505);
  color:var(--rp-green);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px;
  font-size:20px;
  z-index:999999;
  font-family:var(--rp-font);
  border-bottom:1px solid var(--rp-border-accent);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

#hudTop>div{
  display:flex;
  align-items:center;
  gap:4px;
}

/* ============================================================
   BARRA DE BÚSQUEDA SUPERIOR
   ============================================================ */
#inputTop{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  max-width:600px;
  height:48px;
  padding:0 22px;
  border-radius:var(--rp-r-pill);
  font-size:18px;
  text-align:center;
  z-index:5000;
  border:1px solid var(--rp-border);
  background:rgba(12,12,16,0.80);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  color:var(--rp-text);
  box-shadow:var(--rp-shadow-sm);
  outline:none;
  transition:var(--rp-t);
}

#inputTop::placeholder{color:var(--rp-text-3);}

#inputTop:focus{
  background:rgba(16,16,22,0.90);
  box-shadow:var(--rp-glow), var(--rp-shadow-sm);
  border-color:var(--rp-border-accent);
}

#direccionMapa{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  max-width:600px;
  height:44px;
  padding:0 22px;
  border-radius:var(--rp-r-pill);
  font-size:16px;
  text-align:center;
  z-index:5000;
  border:1px solid var(--rp-border);
  background:rgba(12,12,16,0.80);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  color:var(--rp-text);
  box-shadow:var(--rp-shadow-sm);
  outline:none;
  transition:var(--rp-t);
}

#direccionMapa::placeholder{color:var(--rp-text-3);}

#direccionMapa:focus{
  background:rgba(16,16,22,0.90);
  box-shadow:var(--rp-glow), var(--rp-shadow-sm);
  border-color:var(--rp-border-accent);
}

/* ============================================================
   BOTONES CIRCULARES (Login / Lista)
   ============================================================ */
.circleBtn{
  position:fixed;
  width:100px;
  height:100px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:48px;
  cursor:pointer;
  z-index:6000;
  background:var(--rp-panel-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--rp-border);
  box-shadow:var(--rp-shadow-sm);
  transition:var(--rp-t);
}

.circleBtn:active{transform:scale(0.92);}

#btnLeft.activo{
  background:linear-gradient(145deg,var(--rp-green-d),var(--rp-green));
  box-shadow:0 0 25px var(--rp-green), 0 0 60px rgba(0,255,136,0.4);
  transform:scale(1.1);
  border-color:var(--rp-green);
}

#btnLeft{top:180px; left:20px;}
#btnRight{top:180px; right:20px;}

/* ============================================================
   HEADER (Panel de registro/edición)
   ============================================================ */
#header{
  position:fixed;
  top:300px;
  bottom:120px;
  left:-100%;
  width:100%;
  max-width:520px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  transition:left 0.4s ease;
  z-index:20000;
  padding:24px;
  box-sizing:border-box;
  background:var(--rp-panel-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--rp-border-accent);
  box-shadow:var(--rp-shadow);
  color:var(--rp-text);
}

#header.open{left:0;}

#header input{
  width:100%;
  margin:8px 0;
  padding:14px 16px;
  border-radius:var(--rp-r-md);
  border:1px solid var(--rp-border);
  background:rgba(255,255,255,0.05);
  color:var(--rp-text);
  font-size:16px;
  font-family:var(--rp-font);
  outline:none;
  transition:var(--rp-t);
  box-sizing:border-box;
}

#header input::placeholder{color:var(--rp-text-3);}

#header input:focus{
  border-color:var(--rp-border-accent);
  background:rgba(255,255,255,0.08);
}

#header button{
  width:100%;
  margin:8px 0;
  padding:14px;
  border-radius:var(--rp-r-md);
  border:none;
  background:linear-gradient(145deg,var(--rp-green-d),var(--rp-green));
  color:#001a0e;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:var(--rp-t);
  font-family:var(--rp-font);
}

#header button:active{transform:scale(0.97);}

#barra{
  display:flex;
  flex-direction:column;
}

/* ============================================================
   LATERAL (Lista de usuarios)
   ============================================================ */
#lateral{
  position:fixed;
  top:180px;
  right:-100%;
  width:480px;
  max-width:95vw;
  height:calc(100% - 200px);
  padding:16px;
  overflow:auto;
  box-sizing:border-box;
  background:var(--rp-panel-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-left:1px solid var(--rp-border-accent);
  border-radius:var(--rp-r-lg) 0 0 var(--rp-r-lg);
  box-shadow:var(--rp-shadow);
  transition:right 0.35s ease;
  z-index:20000;
  color:var(--rp-text);
}

#lateral.open{right:0;}

#lateral::-webkit-scrollbar{width:8px;}
#lateral::-webkit-scrollbar-track{background:transparent;}
#lateral::-webkit-scrollbar-thumb{background:var(--rp-green-d); border-radius:20px;}
#lateral::-webkit-scrollbar-thumb:hover{background:var(--rp-green);}

/* ============================================================
   MENU CIRCULOS INFERIOR
   ============================================================ */
#menuCirculos{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  background:var(--rp-panel-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--rp-border);
  box-shadow:var(--rp-shadow-sm);
  padding:8px 12px;
  border-radius:var(--rp-r-pill);
  z-index:99999;
}

.miniBtn{
  width:64px;
  height:64px;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  color:var(--rp-text);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  cursor:pointer;
  border:1px solid var(--rp-border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
  transition:var(--rp-t);
}

.miniBtn:active{transform:scale(0.92);}
.miniBtn:hover{
  transform:translateY(-3px);
  border-color:var(--rp-border-accent);
  background:rgba(0,255,136,0.08);
}

.miniBtn.activo{
  background:linear-gradient(145deg,var(--rp-green-d),var(--rp-green));
  box-shadow:0 0 20px rgba(0,255,136,0.5);
  color:#001a0e;
  border:none;
}

.vivoBtn{position:relative;}

.vivoBtn::after{
  content:"";
  position:absolute;
  width:12px;
  height:12px;
  top:6px;
  right:6px;
  background:var(--rp-green);
  border-radius:50%;
  box-shadow:0 0 10px var(--rp-green);
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.8); opacity:0.4;}
  100%{transform:scale(1); opacity:1;}
}

@media(max-width:768px){
  .miniBtn{width:52px !important; height:52px !important; font-size:24px !important;}
  .circleBtn{width:72px; height:72px; font-size:36px;}
  #inputTop,#direccionMapa{width:85%;}
}

/* ============================================================
   OVERLAYS DEL MAPA
   ============================================================ */
.overlay{
  position:absolute;
  width:380px;
  max-width:90vw;
  background:#ffffff;
  border-radius:var(--rp-r-md);
  box-shadow:0 16px 40px rgba(0,0,0,0.45);
  transform:translate(-50%,-75%);
  z-index:9999;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.overlay,.overlay *{color:#111;}

.overlay .perfil{width:100%; height:300px; object-fit:cover;}

.overlay .info{
  padding:12px;
  font-size:18px;
}

.productos{
  flex:1;
  overflow-y:auto;
  background:#f5f5f5;
  min-height:100px;
  max-height:250px;
}

.productos::-webkit-scrollbar{width:20px;}
.productos::-webkit-scrollbar-track{background:#ddd; border-radius:20px;}
.productos::-webkit-scrollbar-thumb{background:var(--rp-green-d); border-radius:20px;}
.productos::-webkit-scrollbar-thumb:hover{background:var(--rp-green);}

.producto{
  display:flex;
  gap:16px;
  padding:16px;
  border-bottom:1px solid #ccc;
}

.producto img{width:200px; height:200px; border-radius:var(--rp-r-sm); object-fit:cover;}

.precio{
  background:#111;
  color:#fff;
  padding:3px 8px;
  border-radius:var(--rp-r-sm);
  font-size:14px;
  font-weight:700;
  display:inline-block;
}

/* ============================================================
   TARJETAS VERTICALES (Lateral)
   ============================================================ */
.cardVertical{
  background:#ffffff;
  margin:10px 0;
  padding:16px;
  border-radius:var(--rp-r-md);
  box-shadow:var(--rp-shadow-sm);
  font-size:18px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  transition:var(--rp-t);
  border:2px solid transparent;
}

.cardVertical:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 35px rgba(0,255,136,0.15);
}

.cardVertical img.perfilCard{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  object-position:center;
  border-radius:var(--rp-r-md);
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

.infoCard{padding:10px 0;}
.infoCard b{font-size:20px;}

.necesito,.ofrezco{margin:4px 0; font-size:16px;}
.necesito{color:var(--rp-red); font-weight:600;}
.ofrezco{color:var(--rp-green-d); font-weight:600;}

.productosCard{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}

.productoCard{
  width:calc(33% - 7px);
  background:#fff;
  padding:8px;
  border-radius:var(--rp-r-sm);
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.productoCard img{width:100%; height:130px; object-fit:cover; border-radius:var(--rp-r-sm);}

.detalleProducto{padding:6px 0;}

.precioProducto{color:var(--rp-green-d); font-weight:800; font-size:15px;}
.descProducto{font-size:13px; color:#333;}

.brillo{animation:flashBorder 1.2s ease-in-out;}

@keyframes flashBorder{
  0%{box-shadow:0 0 0px var(--rp-red);}
  50%{box-shadow:0 0 25px 8px var(--rp-red);}
  100%{box-shadow:0 0 0px var(--rp-red);}
}

/* ============================================================
   PANEL LUGAR (Google Place)
   ============================================================ */
#panelLugar{
  position:fixed;
  left:16px;
  top:180px;
  bottom:120px;
  width:360px;
  max-width:90vw;
  background:var(--rp-panel-bg);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  border:1px solid var(--rp-border);
  border-radius:var(--rp-r-lg);
  color:var(--rp-text);
  z-index:99999;
  padding:18px;
  box-sizing:border-box;
  overflow-y:auto;
  transform:translateX(-120%);
  opacity:0;
  transition:transform 0.35s ease, opacity 0.35s ease;
  box-shadow:var(--rp-shadow);
}

#panelLugar.show{transform:translateX(0); opacity:1;}

#panelLugar::-webkit-scrollbar{width:6px;}
#panelLugar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15); border-radius:10px;}

#panelLugar img{
  width:100%;
  border-radius:var(--rp-r-md);
  margin-top:10px;
  margin-bottom:10px;
  object-fit:cover;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}

#panelLugar h1,#panelLugar h2{font-size:26px; margin:12px 0 6px 0; font-weight:800; line-height:1.2;}
#panelLugar p{font-size:16px; opacity:0.85; line-height:1.4; margin:6px 0;}

/* ============================================================
   PANEL IA
   ============================================================ */
.aiPanel{
  position:fixed;
  bottom:140px;
  right:20px;
  width:400px;
  height:440px;
  max-width:90vw;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--rp-panel-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--rp-border);
  border-radius:var(--rp-r-lg);
  z-index:999999;
  opacity:0;
  pointer-events:none;
  transform:translateY(20px) scale(0.98);
  transition:var(--rp-t-smooth);
  resize:both;
  min-width:260px;
  min-height:220px;
  color:var(--rp-text);
  font-family:var(--rp-font);
  box-shadow:var(--rp-shadow);
}

.aiPanel.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0) scale(1);
}

.aiHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:var(--rp-panel-header);
  border-bottom:1px solid var(--rp-border);
  color:var(--rp-text);
  font-weight:700;
  font-size:16px;
  cursor:move;
  touch-action:none;
  user-select:none;
}

.aiHeader span{color:var(--rp-green);}

.aiChat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.aiChat::-webkit-scrollbar{width:6px;}
.aiChat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12); border-radius:10px;}

.aiMsgUser{
  align-self:flex-end;
  background:rgba(0,255,136,0.15);
  color:var(--rp-text);
  padding:10px 14px;
  border-radius:var(--rp-r-md) var(--rp-r-md) 4px var(--rp-r-md);
  max-width:80%;
  font-size:15px;
  line-height:1.4;
  animation:msgIn 0.2s ease-out;
}

.aiMsgBot{
  align-self:flex-start;
  background:rgba(255,255,255,0.06);
  color:var(--rp-text);
  padding:10px 14px;
  border-radius:var(--rp-r-md) var(--rp-r-md) var(--rp-r-md) 4px;
  max-width:80%;
  font-size:15px;
  line-height:1.5;
  animation:msgIn 0.2s ease-out;
}

@keyframes msgIn{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

.aiInputBox{
  display:flex;
  padding:10px;
  gap:8px;
  background:var(--rp-panel-header);
  border-top:1px solid var(--rp-border);
}

.aiInputBox input{
  flex:1;
  padding:12px 14px;
  border-radius:var(--rp-r-md);
  border:1px solid var(--rp-border);
  background:rgba(255,255,255,0.05);
  color:var(--rp-text);
  font-size:15px;
  outline:none;
  transition:var(--rp-t);
  font-family:var(--rp-font);
}

.aiInputBox input::placeholder{color:var(--rp-text-3);}

.aiInputBox input:focus{
  border-color:var(--rp-border-accent);
  background:rgba(255,255,255,0.08);
}

.aiInputBox button{
  padding:10px 16px;
  border-radius:var(--rp-r-md);
  border:none;

// =======================================================
// FUNCIONES DE LIMPIEZA
// =======================================================
function clean(v){ return (v||"").toString().trim(); }

function cleanRut(v){
  return (v||"").toString().replace(/\./g,"").replace(/-/g,"").trim();
}

function cleanPhone(v){
  let num = (v||"").toString().replace(/\D/g,"");
  if(num.length === 8) return "569"+num;
  if(num.length === 9 && num.startsWith("9")) return "56"+num;
  if(num.startsWith("56")) return num;
  return num;
}

function normalizar(texto){
  return (texto||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function fraseAleatoria(lista){
  return lista[Math.floor(Math.random()*lista.length)];
}

// =======================================================
// CONVERTIR URL DRIVE
// =======================================================
function convertirDrive(url){
  if(!url) return "";
  if(!url.includes("drive.google.com")) return url;
  const match = url.match(/[-\w]{25,}/);
  if(match) return "https://drive.google.com/thumbnail?id=" + match[0] + "&sz=w1000";
  return url;
}

// =======================================================
// OVERLAY PERSONALIZADO
// =======================================================
class CustomOverlay extends google.maps.OverlayView{
  constructor(position, data){
    super();
    this.fijado = false;
    this.position = position;
    this.data = data;
    this.div = null;
  }

  highlight(color="#ffcc00"){
    if(this.div){
      this.div.style.boxShadow = "0 6px 15px " + color + ", 0 0 40px rgba(255,204,0,0.5)";
      this.div.style.zIndex = 10000;
    }
  }

  normalize(){
    if(this.div){
      this.div.style.boxShadow = "0 16px 40px rgba(0,0,0,0.45)";
      this.div.style.zIndex = 9999;
    }
  }

  onAdd(){
    this.div = document.createElement("div");
    this.div.className = "overlay";
    this.div.style.display = "none";

    this.div.addEventListener("mouseenter", () => {
      overlays.forEach(o => { if(o.div) o.div.style.zIndex = 9999; });
      this.div.style.zIndex = 99999;
    });

    this.div.addEventListener("mouseleave", () => {
      this.div.style.zIndex = 9999;
      this.normalize();
    });

    this.div.addEventListener("click", (e) => {
      e.stopPropagation();
      if(isDraggingMap) return;
      if(bloqueoClickOverlay) return;

      const lateral = document.getElementById("lateral");
      if(filtroActivo) renderLateral(dataGlobal);
      if(!lateral.classList.contains("open")) lateral.classList.add("open");

      const tarjeta = lateral.querySelector(".perfilCard[data-fila='" + this.data.fila + "']");
      if(tarjeta){
        tarjeta.scrollIntoView({behavior:"smooth", block:"center"});
        lateral.querySelectorAll(".cardVertical").forEach(c => {
          c.style.boxShadow = "";
          c.classList.remove("brillo");
        });
        const cardParent = tarjeta.parentElement;
        cardParent.style.boxShadow = "0 0 20px #ff3d00";
        cardParent.classList.add("brillo");
        setTimeout(() => cardParent.classList.remove("brillo"), 1200);
      }
    });

    let productos = [
      {img:clean(this.data.foto1), precio:clean(this.data.precio1), desc:clean(this.data.descripcion1)},
      {img:clean(this.data.foto2), precio:clean(this.data.precio2), desc:clean(this.data.descripcion2)},
      {img:clean(this.data.foto3), precio:clean(this.data.precio3), desc:clean(this.data.descripcion3)}
    ].filter(p => p.img !== "");

    if(productos.length === 0){
      productos = [{img:"https://placehold.co/80", precio:"", desc:"Sin productos"}];
    }

    const foto = convertirDrive(clean(this.data.link));
    const srcFinal = foto || "https://placehold.co/600x400?text=Sin+Foto";

    this.div.innerHTML = `
      <img class="perfil" src="${srcFinal}" onerror="this.src='https://placehold.co/600x400?text=Sin+Foto'">
      <div class="info">
        <div style="display:flex;gap:8px;margin-top:10px;">
          <input id="msg_${this.data.fila}" placeholder="Escribe un mensaje..."
            onclick="event.stopPropagation()" onfocus="event.stopPropagation()"
            onmousedown="event.stopPropagation()" onpointerdown="event.stopPropagation()"
            ontouchstart="event.stopPropagation()"
            style="flex:1;padding:14px;border-radius:8px;border:1px solid #ccc;font-size:16px;">
          <button onclick="event.stopPropagation(); enviarMensajeRapido(${this.data.fila})"
            style="background:#00c853;color:white;border:none;padding:14px 20px;font-size:16px;border-radius:8px;font-weight:bold;cursor:pointer;">
            Enviar
          </button>
        </div>
        <b>${clean(this.data.nombre)}</b><br>
        <div style="background:#ff3d00;color:#fff;padding:5px 10px;border-radius:8px;display:inline-block;margin:5px 0;">
          NECESITO: ${clean(this.data.necesito) || "No especifica"}
        </div>
        OFREZCO: ${clean(this.data.ofrezco)}<br>
      </div>
      <div class="productos">
        ${productos.map(p => `
          <div class="producto">
            <img src="${p.img}" onerror="this.src='https://placehold.co/250?text=Sin+Foto'">
            <div>
              <div class="precio">$${p.precio}</div>
              <div>${p.desc}</div>
            </div>
          </div>
        `).join("")}
      </div>
    `;

    this.getPanes().overlayMouseTarget.appendChild(this.div);
  }

  draw(){
    if(!this.div) return;
    const projection = this.getProjection();
    if(!projection) return;
    const pos = projection.fromLatLngToDivPixel(this.position);
    if(!pos) return;
    this.div.style.left = pos.x + "px";
    this.div.style.top = pos.y + "px";
    const zoom = map.getZoom();
    let scale = (zoom < 13 ? 0.9 : 1) * getMobileScale();
    this.div.style.transform = "translate(-50%,-75%) scale(" + scale + ")";
  }

  onRemove(){
    if(this.div) this.div.remove();
  }
}

// =======================================================
// ESCALA MÓVIL

function getMobileScale(){
  const w = window.innerWidth;
  if(w < 480) return 1.4;
  if(w < 768) return 1.2;
  return 1;
}

            {img:d.foto3, precio:d.precio3, desc:d.descripcion3}
          ].filter(p => p.img).map(p => `
            <div class="productoCard">
              <img src="${p.img}" onerror="this.src='https://placehold.co/400x300?text=Sin+Foto'">
              <div class="detalleProducto">
                <div class="precioProducto">$${p.precio}</div>
                <div class="descProducto">${p.desc}</div>
              </div>
            </div>
          `).join('')
        }
      </div>
    `;

    if(necesitoActual && (d.ofrezco || "").toLowerCase().includes(necesitoActual)){
      card.style.border = "4px solid #00ff95";
    }

    lateral.appendChild(card);

    card.querySelector(".perfilCard").addEventListener("click", e => {
      const fila = Number(e.currentTarget.getAttribute("data-fila"));
      if(!fila) return;
      const overlay = overlays.find(o => Number(o.data.fila) === Number(fila));
      if(overlay){
        bloqueoClickOverlay = true;
        map.panTo(overlay.position);
        map.setZoom(23);
        setTimeout(() => bloqueoClickOverlay = false, 800);
        if(activeOverlay && activeOverlay.div) activeOverlay.div.style.boxShadow = "";

        if(activeOverlay.div) activeOverlay.div.style.boxShadow = "0 0 25px #ff3d00";

// =======================================================
// RENDER MAPA
// =======================================================
function render(data){
  const lateral = document.getElementById("lateral");
  lateral.innerHTML = "";
  markers.forEach(m => m.setMap(null));
  marcadoresAqui.forEach(m => m.setMap(null));
  marcadoresAqui = [];
  markers = [];
  dataGlobal = data;

  overlays.forEach(o => {
    if(o.div) o.div.remove();
    o.setMap(null);
  });
  overlays = [];

  const infowindow = new google.maps.InfoWindow();

  data.forEach(d => {
    const pos = new google.maps.LatLng(d.lat, d.lng);
    const marker = new google.maps.Marker({position:pos, map:map});

    if(Number(d.fila) === Number(filaActual)){
      marker.setIcon({
        path: google.maps.SymbolPath.CIRCLE,
        scale: 14,
        fillColor: "#00ff95",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 4
      });
      marker.setZIndex(9999);
    }

    marker.addListener("mouseover", () => {
      const overlay = overlays.find(o => Number(o.data.fila) === Number(d.fila));
      if(overlay && overlay.div){
        overlay.div.style.display = "flex";
        overlay.div.style.zIndex = 99999;
      }
    });

    marker.addListener("mouseout", () => {
      const overlay = overlays.find(o => Number(o.data.fila) === Number(d.fila));
      if(overlay && overlay.div && !overlay.fijado && !overlaysActivos){
        overlay.div.style.display = "none";
      }
    });

    marker.addListener("click", () => {
      const html = `
        <div style="max-width:250px;">
          <h3>${d.nombre || ""}</h3>
          <img src="${d.foto1 || ''}" style="width:100%; border-radius:8px;" onerror="this.style.display='none'">
          <p>${d.direccion || ""}</p>
          <a href__="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank">Ver en Google Maps</a>
        </div>
      `;
      infowindow.setContent(html);
      infowindow.open(map, marker);
    });

    marker.data = d;
    markers.push(marker);

    if(d.ultimaLat && d.ultimaLng){
      const pinAqui = new google.maps.Marker({
        position:{lat:d.ultimaLat, lng:d.ultimaLng},
        map:map,
        icon:{
          path:google.maps.SymbolPath.CIRCLE,
          scale:12,
          fillColor:"#00ff00",
          fillOpacity:1,
          strokeColor:"#ffffff",
          strokeWeight:3
        },
        title:"Aquí"
      });
      marcadoresAqui.push(pinAqui);
    }

    const overlay = new CustomOverlay(pos, d);
    overlay.setMap(map);
    overlays.push(overlay);
  });

  renderLateral(data);
  resaltarOfrecimientos();
}

// =======================================================
// FILTRADO Y RESALTADO
// =======================================================
function resaltarPorNecesito(necesitoValor){
  overlays.forEach(overlay => {
    const ofrezco = (overlay.data.ofrezco || "").toLowerCase();
    if(ofrezco.includes(necesitoValor.toLowerCase())){
      overlay.highlight("#00ff95");
    } else {
      overlay.normalize();
    }
  });
}

function resaltarPines(termino){
  markers.forEach(m => {
    const nombre = (m.data.nombre || "").toLowerCase();
    const ofrezco = (m.data.ofrezco || "").toLowerCase();
    const necesito = (m.data.necesito || "").toLowerCase();
    const match = nombre.includes(termino) || ofrezco.includes(termino) || necesito.includes(termino);
    if(match){
      m.setIcon({
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: "#00ff95",
        fillOpacity: 1,
        strokeColor: "#00ff95",
        strokeWeight: 2
      });
      m.setZIndex(999);
    } else {
      m.setIcon(null);
      m.setZIndex(1);
    }
  });
}

function resaltarOfrecimientos(valor){
  const termino = (valor || necesitoActual || "").toLowerCase();
  if(!termino){
    markers.forEach(m => {
      m.setIcon(null);
      m.setZIndex(1);
      lineasLaser.forEach(l => l.setMap(null));
      lineasLaser = [];
    });
    return;
  }
  const lateral = document.getElementById("lateral");
  const cards = Array.from(lateral.querySelectorAll(".cardVertical"));
  const coincidencias = [];

  cards.forEach(card => {
    const text = (
      (card.querySelector(".ofrezco")?.textContent || "") +
      (card.querySelector(".necesito")?.textContent || "") +
      (card.querySelector("b")?.textContent || "")
    ).toLowerCase();
    if(text.includes(termino)){
      card.style.border = "4px solid #00ff95";
      coincidencias.push(card);
    } else {
      card.style.border = "";
    }
  });

  coincidencias.forEach(c => lateral.insertBefore(c, lateral.firstChild));

  if(coincidencias.length){
    const fila = parseInt(coincidencias[0].querySelector(".perfilCard")?.dataset.fila);
    const overlay = overlays.find(o => o.data.fila === fila);
    if(overlay){
      map.panTo(overlay.position);
      map.setZoom(16);
      if(activeOverlay && activeOverlay.div) activeOverlay.normalize();
      activeOverlay = overlay;
      activeOverlay.highlight("#ff3d00");
    }
  }
}

function toggleOverlays(){
  overlaysVisibles = !overlaysVisibles;
  overlays.forEach(o => {
    if(!o.div) return;
    o.div.style.display = overlaysVisibles ? "flex" : "none";
  });
}

function resetFiltro(){
  inputTop.value = "";
  filtroActivo = "";
  necesito.value = "";
  necesitoActual = "";
  render(dataGlobal);
  overlays.forEach(o => o.normalize());
  overlays.forEach(o => {
    if(!o.div) return;
    if(overlaysVisibles){
      o.div.style.display = "flex";
      o.div.style.opacity = "1";
    } else {
      o.div.style.display = "none";
      o.div.style.opacity = "0";
    }
  });
  const lateral = document.getElementById("lateral");
  lateral.querySelectorAll(".cardVertical").forEach(c => {
    c.style.border = "";
    c.style.opacity = 1;
  });
  markers.forEach(m => { m.setIcon(null); m.setZIndex(1); });
  lineasLaser.forEach(l => l.setMap(null));
  lineasLaser = [];
}

function geocodificarDireccion(direccion){
  return new Promise((resolve, reject) => {
    const geo = new google.maps.Geocoder();
    geo.geocode({address:direccion}, (results, status) => {
      if(status === "OK" && results[0]){
        const location = results[0].geometry.location;
        resolve({lat:location.lat(), lng:location.lng()});
      } else {
        reject("No se pudo geocodificar");
      }
    });
  });
}

function distancia(a, b){
  const dx = a.lat() - b.lat();
  const dy = a.lng() - b.lng();
  return Math.sqrt(dx*dx + dy*dy);
}

function iniciarTour(){
  if(!overlays.length){ alert("No hay datos para recorrer"); return; }
  tourActivo = true;
  tourIndex = 0;
  const centro = map.getCenter();
  let candidatos = overlays.filter(o => o.div && o.div.style.display !== "none");
  candidatos.sort((a, b) => distancia(a.position, centro) - distancia(b.position, centro));
  tourRuta = candidatos.slice(0, 10);

  document.getElementById("inputTop").style.display = "none";
  document.getElementById("menuCirculos").style.display = "none";
  document.getElementById("btnLeft").style.display = "none";
  document.getElementById("btnRight").style.display = "none";
  document.getElementById("btnSalirTour").style.display = "block";

  ejecutarTour();
}

function ejecutarTour(){
  if(!tourActivo || tourIndex >= tourRuta.length){
    detenerTour();
    return;
  }
  const overlay = tourRuta[tourIndex];
  const destino = overlay.position;

  overlays.forEach(o => { if(o.div) o.div.style.display = "none"; });
  if(overlay.div) overlay.div.style.display = "flex";

  flyTo(destino, () => {
    overlay.highlight("#ff3d00");
    setTimeout(() => {
      overlay.normalize();
      tourIndex++;
      ejecutarTour();
    }, 3500);
  });
}

function flyTo(destino, callback){
  const start = map.getCenter();
  const duration = 2000;
  const startTime = performance.now();
  function animar(tiempo){
    const t = Math.min((tiempo - startTime) / duration, 1);
    const lat = start.lat() + (destino.lat() - start.lat()) * t;
    const lng = start.lng() + (destino.lng() - start.lng()) * t;
    map.setCenter({lat, lng});
    map.setZoom(13 + t * 1.5);
    if(t < 1){ requestAnimationFrame(animar); }
    else { if(callback) callback(); }
  }
  requestAnimationFrame(animar);
}

function detenerTour(){
  tourActivo = false;
  overlays.forEach(o => {
    if(o.div){
      o.div.style.display = overlaysVisibles ? "flex" : "none";
      o.normalize();
    }
  });
  markers.forEach(m => m.setAnimation(null));
  document.getElementById("inputTop").style.display = "block";
  document.getElementById("menuCirculos").style.display = "flex";
  document.getElementById("btnLeft").style.display = "flex";
  document.getElementById("btnRight").style.display = "flex";
  document.getElementById("btnSalirTour").style.display = "none";
}

  const fragment = document.createDocumentFragment();

    div.innerHTML = `

  }
}

// REGU - VOZ Y ANIMACIÓN
// =======================================================
function reguHabla(texto, priority = 1){
  if(!texto) return;
  if(!window.reguVoice){
    window.reguVoice = {queue:[], speaking:false, current:null, mode:"normal"};
  }
  if(window.reguVoice.mode === "silent") return;
  window.reguVoice.queue.push({text:texto, priority:priority});
  window.reguVoice.queue.sort((a,b) => b.priority - a.priority);
  if(!window.reguVoice.speaking){
    procesarColaRegu();
  }
}

function procesarColaRegu(){
  if(window.reguVoice.queue.length === 0){
    window.reguVoice.speaking = false;
    animarRegulito(false);
    ocultarLyric();
    return;
  }
  window.reguVoice.speaking = true;
  const task = window.reguVoice.queue.shift();
  const partes = task.text.split(/[.!?]+/).filter(t => t.trim());
  let i = 0;

  const hablar = () => {
    if(i >= partes.length){
      setTimeout(procesarColaRegu, 300);
      return;
    }
    const frase = partes[i].trim();
    mensajeMapa(frase);
    const voz = new SpeechSynthesisUtterance(frase);
    voz.lang = "es-CL";
    voz.onstart = () => animarRegulito(true);
    voz.onend = () => {
      setTimeout(() => { i++; hablar(); }, 400);
    };
    speechSynthesis.speak(voz);
  };
  hablar();
}

function reguModo(modo){
  window.reguVoice.mode = modo;
}

function animarRegulito(hablando){
  const regu = document.getElementById("reguFace");
  if(!regu) return;
  clearInterval(reguAnimacion);
  if(hablando){
    reguAnimacion = setInterval(() => {
      const escala = 1 + Math.random()*0.025;
      const y = Math.random()*2 - 1;
      regu.style.transform = "translateY(" + y + "px) scale(" + escala + ")";
    }, 90);
  } else {
    regu.style.transform = "translateY(0px) scale(1)";
  }
}

function moverReguA(el){
  if(!el) return;
  const regu = document.getElementById("regu");
  const r = el.getBoundingClientRect();
  let x = r.left + (r.width / 2) - 40;
  let y = r.top + (r.height / 2) - 40;
  if(x < 10) x = 10;
  if(y < 70) y = 70;
  if(x > window.innerWidth - 100) x = window.innerWidth - 100;
  if(y > window.innerHeight - 100) y = window.innerHeight - 100;
  regu.style.right = "auto";
  regu.style.bottom = "auto";
  regu.style.left = x + "px";
  regu.style.top = y + "px";

  const satelite = document.getElementById("reguSatelite");
  if(satelite){
    satelite.style.left = (x + 90) + "px";
    satelite.style.top = (y + 10) + "px";
  }
}

function explorarCategoria(tipo){

  if(tipo==="playas")
    aplicarModoRegu("Chispa");

  if(tipo==="romántico")
    aplicarModoRegu("Romántico");

  if(tipo==="naturaleza")
    aplicarModoRegu("Sabio");


  let destino="";


  if(tipo==="sorpréndeme"){

    const todas=[
      ...EXPLORADOR.playas,
      ...EXPLORADOR["romántico"],
      ...EXPLORADOR.castillos,
      ...EXPLORADOR.naturaleza
    ];

    destino=todas[Math.floor(Math.random()*todas.length)];

  }else{

    const lista=EXPLORADOR[tipo];

    if(!lista) return;

    destino=lista[Math.floor(Math.random()*lista.length)];

  }


  const input=document.getElementById("direccionMapa");

  if(input)
    input.value=destino;


  window.destinoActual=destino;
  window.tipoActual=tipo;
  window.vieneDelExplorador=true;


  reguHabla(
    "Preparando viaje a " + destino
  );


  buscarDireccionMapa();


  setTimeout(()=>{

    google.script.run
    .withSuccessHandler(respuesta=>{

      if(respuesta)
        reguHabla(respuesta);

    })
    .withFailureHandler(()=>{

      reguHabla(
        "Tuve problemas conectando con mi memoria de viaje."
      );

    })
    .generarRespuestaReguExplorador({

      modo:tipo,
      lugar:destino,
      texto:
      "Estamos viajando a " + destino

    });


  },1200);


}

window.reguLugarLock = false;

function mostrarLugarGoogle(placeId){

  if(window.reguLugarLock) return;
  window.reguLugarLock = true;

  const panel = document.getElementById("panelLugar");

  if(!panel){
    window.reguLugarLock = false;
    return;
  }

  const service = new google.maps.places.PlacesService(map);

  service.getDetails({
    placeId: placeId,
    fields:[
      "name",
      "formatted_address",
      "geometry",
      "rating",
      "photos"
    ]

  },(place,status)=>{

    try{

      if(
        status !== google.maps.places.PlacesServiceStatus.OK ||
        !place
      ){

        reguHabla("No pude encontrar este lugar.");
        window.reguLugarLock=false;
        return;

      }


      if(place.geometry && place.geometry.location){

        map.panTo(place.geometry.location);
        map.setZoom(17);

      }


      reguHabla(
        place.name +
        ". " +
        (place.formatted_address || "")
      );


      let portada="";

      if(place.photos && place.photos.length){

        portada =
        `
        <img 
        src="${place.photos[0].getUrl({maxWidth:1600})}"
        style="
        width:calc(100% + 36px);
        margin:-18px -18px 18px -18px;
        height:260px;
        object-fit:cover;
        border-radius:20px 20px 0 0;
        ">
        `;

      }


      let galeria="";


      if(place.photos){

        galeria =
        place.photos
        .slice(1,8)
        .map(p=>

          `
          <img 
          src="${p.getUrl({maxWidth:900})}"
          style="
          width:100%;
          height:210px;
          object-fit:cover;
          border-radius:14px;
          margin-top:10px;
          ">
          `

        ).join("");

      }


      panel.innerHTML =
      `
      ${portada}

      <div style="padding:0 5px">

      <h1>
      ${place.name}
      </h1>


      <div>
      ⭐ ${place.rating || "-"}
      </div>


      <p>
      📍 ${place.formatted_address || ""}
      </p>


      ${galeria}

      </div>

      `;


      panel.classList.add("show");


      reguComentarioLugar(place);



    }catch(e){

      console.log(e);
      reguHabla("Error cargando el lugar.");

    }


    window.reguLugarLock=false;


  });

}

 );


 }


 });


}

function hacerArrastrable(id, headerId){

 const box =
 document.getElementById(id);


 if(!box)
 return;


 const header =
 headerId
 ?
 document.getElementById(headerId)
 :
 box;


 if(!header)
 return;



 let moviendo=false;

 let offsetX=0;

 let offsetY=0;



 header.addEventListener(
 "mousedown",
 e=>{

 moviendo=true;

 offsetX =
 e.clientX-box.offsetLeft;

 offsetY =
 e.clientY-box.offsetTop;

 });




 document.addEventListener(
 "mousemove",
 e=>{

 if(!moviendo)
 return;


 box.style.left =
 (e.clientX-offsetX)+"px";


 box.style.top =
 (e.clientY-offsetY)+"px";


 });



 document.addEventListener(
 "mouseup",
 ()=>{

 moviendo=false;

 });



}

function iniciarVozInteligente(){


 const SpeechRecognition =
 window.SpeechRecognition ||
 window.webkitSpeechRecognition;



 if(!SpeechRecognition){

 alert(
 "Tu navegador no soporta voz."
 );

 return;

 }



 const reconocimiento =
 new SpeechRecognition();



 reconocimiento.lang =
 "es-CL";

 reconocimiento.continuous=false;

 reconocimiento.interimResults=true;



 reguHabla(
 "Te escucho..."
 );



 reconocimiento.onresult=function(event){


 let texto="";


 for(
 let i=event.resultIndex;
 i<event.results.length;
 i++
 ){

 texto +=
 event.results[i][0].transcript;

 }



 if(
 event.results[event.results.length-1]
 .isFinal
 ){

 procesarComandoRegu(
 texto
 );


 }


 };



 reconocimiento.onerror=function(e){

 console.log(
 "ERROR VOZ",
 e.error
 );


 if(e.error==="not-allowed"){

 alert(
 "Activa el permiso del micrófono."
 );

 }


 };



 reconocimiento.start();



}





function procesarComandoRegu(texto){


 texto =
 texto.toLowerCase();



 if(texto.includes("explorar")){

 toggleExplorador();

 return;

 }



 if(texto.includes("playa")){

 explorarCategoria(
 "playas"
 );

 return;

 }



 if(texto.includes("música")){

 playMusicaAmbiente();

 return;

 }



 if(texto.includes("silencio")){

 stopMusica();

 return;

 }



 google.script.run

 .withSuccessHandler(
 respuesta=>{

 if(respuesta)
 reguHabla(respuesta);

 })

 .preguntarIA(
 texto,
 ""
 );


}
